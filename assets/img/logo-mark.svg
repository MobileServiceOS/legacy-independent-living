<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Legacy Independent Living mark">
  <defs>
    <clipPath id="c"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>
  <circle cx="60" cy="60" r="58" fill="#FBF8F1" stroke="#A8B06A" stroke-width="2.5"/>
  <g clip-path="url(#c)">
    <!-- sky -->
    <rect x="0" y="0" width="120" height="120" fill="#FBF8F1"/>
    <!-- arcing branch -->
    <path d="M18 40 C40 18, 86 16, 104 46" fill="none" stroke="#634C2C" stroke-width="2.4" stroke-linecap="round"/>
    <g fill="#8FA05A">
      <ellipse cx="40" cy="22" rx="5" ry="3" transform="rotate(-30 40 22)"/>
      <ellipse cx="58" cy="17" rx="5" ry="3" transform="rotate(-8 58 17)"/>
      <ellipse cx="76" cy="18" rx="5" ry="3" transform="rotate(14 76 18)"/>
      <ellipse cx="92" cy="26" rx="5" ry="3" transform="rotate(34 92 26)"/>
    </g>
    <!-- tree -->
    <path d="M28 78 C26 60, 28 46, 33 40" fill="none" stroke="#634C2C" stroke-width="4.5" stroke-linecap="round"/>
    <g fill="#7E814C">
      <circle cx="31" cy="40" r="11"/><circle cx="20" cy="47" r="8"/><circle cx="42" cy="46" r="9"/><circle cx="31" cy="53" r="9"/>
    </g>
    <g fill="#8FA05A" opacity=".85"><circle cx="25" cy="42" r="5"/><circle cx="38" cy="40" r="5"/></g>
    <!-- house -->
    <g>
      <rect x="78" y="58" width="26" height="24" fill="#F5E8D5" stroke="#634C2C" stroke-width="1.2"/>
      <path d="M75 59 L91 46 L107 59 Z" fill="#4A5533"/>
      <rect x="87" y="66" width="8" height="8" fill="#4A5533"/>
    </g>
    <!-- ground + path -->
    <path d="M-2 86 C30 80, 90 80, 122 86 L122 122 L-2 122 Z" fill="#A8B06A"/>
    <path d="M52 122 C56 104, 70 96, 84 90 C72 100, 66 110, 66 122 Z" fill="#F3EEE2" opacity=".9"/>
    <!-- two figures walking -->
    <g fill="#4A5533">
      <circle cx="52" cy="74" r="5"/>
      <path d="M47 80 q5 -4 10 0 l-1 18 -3 0 -1 -10 -1 10 -3 0 Z"/>
      <circle cx="64" cy="76" r="4"/>
      <path d="M60 81 q4 -3 8 0 l-1 15 -2 0 -1 -8 -1 8 -2 0 Z"/>
    </g>
  </g>
</svg>
